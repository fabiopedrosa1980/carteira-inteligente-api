services:
  - type: web
    name: carteira-inteligente-api
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8080
      # DSN do PostgreSQL no formato:
      # postgresql://USER:PASSWORD@HOST:5432/carteira_digital_bd?sslmode=require
      # Valor definido no dashboard/secret do Render (nunca commitado).
      - key: DATABASE_URL
        sync: false
